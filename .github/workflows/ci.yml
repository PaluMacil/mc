# Build, test, and (on a version tag) publish the two mc web images. homelab has
# no CI; image building lives here. A tag push builds ghcr.io/palumacil/mc-web
# and mc-invite at that tag, which is exactly the tag deploy/base pins, so
# cutting a release is: bump the image tags in deploy/base, commit, tag.
name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: invite
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: install templ
        run: go install github.com/a-h/templ/cmd/templ@v0.3.1020

      - name: mc-web vet/test/build
        working-directory: web
        run: |
          go vet ./...
          go test ./...
          go build ./...

      - name: mc-invite generated code is current
        working-directory: invite
        run: |
          templ generate
          git diff --exit-code -- ':*_templ.go' || {
            echo "generated templ code is stale; run 'templ generate' and commit"; exit 1; }

      - name: mc-invite vet/test/build
        working-directory: invite
        env:
          INVITE_TEST_DATABASE_URL: postgres://postgres:test@localhost:5432/invite?sslmode=disable
        run: |
          go vet ./...
          go test ./...
          go build ./...

  images:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: mc-web
            context: web
          - name: mc-invite
            context: invite
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.context }}
          push: true
          platforms: linux/amd64
          tags: ghcr.io/palumacil/${{ matrix.name }}:${{ github.ref_name }}
