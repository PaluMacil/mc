# BlueMap core config, pre-seeded onto /data/config/bluemap/core.conf through
# itzg's /config overlay (see statefulset.yaml: SYNC_SKIP_NEWER_IN_DESTINATION).
# Only the keys we override live here; BlueMap falls back to its own compiled-in
# defaults for every key that is absent or commented out, so this file stays
# small and does not drift against future BlueMap versions.

# Accept Mojang's EULA and let BlueMap download the vanilla client jar for the
# server's Minecraft version from piston-meta.mojang.com. BlueMap extracts the
# block models and textures it renders the 3D map from; without them it refuses
# to render. Default is false, which is why this must be set explicitly. The pod
# needs outbound HTTPS to Mojang the first time it renders (the jar is then
# cached under /data/bluemap, so later boots do not re-download).
accept-download: true

# One render thread. jade also runs the single-threaded tick loop; extra render
# threads would steal CPU from it during map generation. This is also BlueMap's
# own default, pinned here so it stays explicit next to accept-download.
render-thread-count: 1
