apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Phase 1: game server
  - statefulset.yaml
  - service.yaml
  - service-game.yaml
  # Phase 2: BlueMap web map + landing page, behind Traefik on mc.danwolf.net
  - service-map.yaml
  - web-deployment.yaml
  - web-service.yaml
  - middleware-map.yaml
  - ingress.yaml
  # Monitoring: /metrics from the Prometheus Exporter mod, scraped by the
  # ServiceMonitor in the homelab overlay (Grafana dashboard lives there too).
  - service-metrics.yaml
  # Phase 3: invite app + cluster-internal RCON it drives
  - service-rcon.yaml
  - invite-deployment.yaml
  - invite-service.yaml

configMapGenerator:
  # BlueMap core.conf, mounted into the mc pod at /config/bluemap and overlaid
  # onto /data/config/bluemap by itzg before the server starts. The name-hash
  # suffix rolls the StatefulSet whenever core.conf changes.
  - name: mc-bluemap-config
    files:
      - core.conf=bluemap/core.conf
