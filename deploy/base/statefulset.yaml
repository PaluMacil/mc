apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mc
  labels:
    app: mc
spec:
  serviceName: mc
  replicas: 1
  selector:
    matchLabels:
      app: mc
  template:
    metadata:
      labels:
        app: mc
    spec:
      # ATM10 takes a while to save on shutdown. Budget: 60s announce delay
      # (STOP_SERVER_ANNOUNCE_DELAY) + up to 60s stop wait (itzg default
      # STOP_DURATION) + world save. Do not lower this.
      terminationGracePeriodSeconds: 300
      securityContext:
        # Applied to the Longhorn backups volume so the backup container
        # (UID 1000) can write to it. local-path volumes ignore fsGroup;
        # the server entrypoint handles /data ownership itself (it starts
        # as root, chowns /data to UID/GID 1000, then drops privileges).
        fsGroup: 1000
      initContainers:
        # Stage the server pack zip from the private R2 bucket onto the
        # persistent data volume. Skip-if-present is keyed on the object
        # name, so a normal restart fetches nothing; bumping PACK_OBJECT
        # (a new object name) is what triggers a fetch. The .partial + mv
        # dance keeps a torn download from ever satisfying the skip check.
        - name: fetch-pack
          image: curlimages/curl:8.21.0
          command: [sh, -c]
          args:
            - |
              set -eu
              dest="/data/packs/${PACK_OBJECT}"
              if [ -s "$dest" ]; then
                echo "pack already staged: $dest"
                exit 0
              fi
              mkdir -p /data/packs
              echo "fetching ${PACK_OBJECT} from R2"
              curl -sS -f --retry 3 \
                --aws-sigv4 "aws:amz:auto:s3" \
                --user "${R2_ACCESS_KEY_ID}:${R2_SECRET_ACCESS_KEY}" \
                -o "${dest}.partial" \
                "${R2_ENDPOINT}/${R2_BUCKET}/${PACK_OBJECT}"
              mv "${dest}.partial" "$dest"
              wc -c "$dest"
          env:
            # Keep PACK_OBJECT in sync with GENERIC_PACK on the mc container.
            - name: PACK_OBJECT
              value: ServerFiles-7.1.zip
            # Endpoint and bucket are not secret material; only the
            # credentials live in the mc-r2 Secret (read-only key).
            - name: R2_ENDPOINT
              value: https://420bf1d048967f710944f505aebf45ca.r2.cloudflarestorage.com
            - name: R2_BUCKET
              value: mc-mods
            - name: R2_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: mc-r2
                  key: access-key-id
            - name: R2_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: mc-r2
                  key: secret-access-key
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: mc
          image: itzg/minecraft-server:2026.7.0-java21
          env:
            - name: EULA
              value: "TRUE"
            - name: TZ
              value: America/Chicago
            # The official ATM10 SERVER pack (built with the pack authors'
            # distribution permissions), applied as a generic pack overlay.
            # No CurseForge API involvement at runtime.
            - name: TYPE
              value: NEOFORGE
            - name: VERSION
              value: "1.21.1"
            # Must match the pack's loader version exactly (7.1 ships
            # neoforge 21.1.234 per config/crash_assistant/modlist.json in
            # AllTheMods/ATM-10). Bump together with the pack.
            - name: NEOFORGE_VERSION
              value: "21.1.234"
            # Keep in sync with PACK_OBJECT on the fetch-pack initContainer.
            # The image records sha1 state in /data/.generic_pack.sum and
            # skips the whole extract when unchanged, so normal restarts do
            # not redo the 1.1GB apply. On change it removes every file the
            # old pack installed (/data/manifest.txt) before overlaying the
            # new one; world/ and Modrinth-managed jars are never touched.
            # Do NOT set SKIP_GENERIC_PACK_UPDATE_CHECK (silently blocks
            # future upgrades) or REMOVE_OLD_MODS (forces a full reapply
            # every boot). .generic_pack.sum and manifest.txt in /data are
            # load-bearing state; never delete them.
            - name: GENERIC_PACK
              value: /data/packs/ServerFiles-7.1.zip
            # Extra server-side-only mods from Modrinth, pinned by version ID.
            # Rmp3tvQg = GriefLogger 1.2.9-1.21.1 (neoforge build), block-change
            # audit for griefing forensics. spark is NOT listed because ATM10
            # already ships it; adding it again would duplicate the jar.
            # Never list a mod the pack itself ships; the pack manifest would
            # own the filename and delete it on pack upgrades.
            - name: MODRINTH_PROJECTS
              value: "grieflogger:Rmp3tvQg"
            # "required" can pull dependency versions that fight the pack's own
            # pinned mods (itzg/docker-minecraft-server#3849). Pin explicitly
            # instead if a Modrinth mod ever needs a dependency.
            - name: MODRINTH_DOWNLOAD_DEPENDENCIES
              value: "none"
            - name: MEMORY
              value: 12G
            # At 12G and above, itzg applies Aikar's large-heap G1 variant.
            - name: USE_AIKAR_FLAGS
              value: "true"
            # Disable the vanilla watchdog. ATM10 chunk generation can stall a
            # tick long enough that the watchdog would kill the server.
            - name: MAX_TICK_TIME
              value: "-1"
            # Modded flight (jetpacks, mod elytra) trips the vanilla anti-cheat
            # and kicks players when this is false.
            - name: ALLOW_FLIGHT
              value: "TRUE"
            - name: VIEW_DISTANCE
              value: "10"
            - name: SIMULATION_DISTANCE
              value: "6"
            - name: MAX_PLAYERS
              value: "10"
            - name: DIFFICULTY
              value: normal
            - name: ONLINE_MODE
              value: "TRUE"
            - name: ENFORCE_SECURE_PROFILE
              value: "TRUE"
            # Every player arrives from tin's IP (nginx stream proxy), which
            # does not match what Mojang's session server saw. With the vanilla
            # default (true), nobody can log in. Do not "fix" this to true.
            - name: PREVENT_PROXY_CONNECTIONS
              value: "FALSE"
            # Java profile name (verified against Mojang: UUID
            # 892ab825-9c2d-46cb-94d5-f6ce6babfd00). Note this differs from
            # the Microsoft gamertag, which has no underscore.
            - name: WHITELIST
              value: Palu_Macil
            - name: ENFORCE_WHITELIST
              value: "TRUE"
            # SKIP = seed whitelist.json from WHITELIST on first boot only,
            # then never touch the file again. Runtime RCON additions and
            # removals survive restarts. The default (SYNC_FILE_MERGE_LIST)
            # would re-merge the env list every boot.
            - name: EXISTING_WHITELIST_FILE
              value: SKIP
            - name: OPS
              value: Palu_Macil
            - name: EXISTING_OPS_FILE
              value: SKIP
            # RCON stays pod-internal (no Service exposes 25575). rcon-cli
            # inside the container reads the password automatically.
            - name: RCON_PASSWORD_FILE
              value: /secrets/rcon-password
            # Announce shutdown in-game, then wait this many seconds before
            # stopping. Pairs with terminationGracePeriodSeconds above.
            - name: STOP_SERVER_ANNOUNCE_DELAY
              value: "60"
          ports:
            - name: game
              containerPort: 25565
          resources:
            requests:
              cpu: "4"
              memory: 13Gi
            limits:
              # No CPU limit on purpose. The tick loop is single-threaded and
              # CFS throttling tanks TPS. Do not add one.
              memory: 16Gi
          startupProbe:
            # First boot installs NeoForge, applies the 1.1GB pack, and
            # generates spawn before the port ever opens. Budget:
            # 120 x 10s = 20 minutes.
            exec:
              command: [mc-health]
            periodSeconds: 10
            failureThreshold: 120
            timeoutSeconds: 10
          readinessProbe:
            exec:
              command: [mc-health]
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 10
          livenessProbe:
            # Forgiving on purpose: a liveness restart bounces a 12G modded
            # server. 5 x 30s of unresponsiveness before we give up on it.
            exec:
              command: [mc-health]
            periodSeconds: 30
            failureThreshold: 5
            timeoutSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
            - name: secrets
              mountPath: /secrets
              readOnly: true
        - name: backup
          image: itzg/mc-backup:2026.7.0
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          env:
            - name: TZ
              value: America/Chicago
            - name: BACKUP_METHOD
              value: restic
            # Local restic repository on the Longhorn PVC (3 replicas, one per
            # node), so backups survive losing jade. Deliberately not offsite;
            # disk and node loss are the failures that matter here.
            - name: RESTIC_REPOSITORY
              value: /backups
            - name: RESTIC_PASSWORD_FILE
              value: /secrets/restic-password
            # RCON_HOST defaults to localhost, correct for a same-pod sidecar.
            # The sidecar runs save-off, save-all flush, sync before each
            # snapshot and save-on after, so snapshots are world-consistent.
            - name: RCON_PASSWORD_FILE
              value: /secrets/rcon-password
            # Block until the server's RCON is up instead of crash-looping
            # through the 20 minute first boot.
            - name: RCON_RETRIES
              value: "-1"
            - name: INITIAL_DELAY
              value: 5m
            - name: BACKUP_INTERVAL
              value: 1h
            # After a backup completes with nobody online, hold further
            # backups until someone joins again (one final backup still runs
            # after the last player leaves).
            - name: PAUSE_IF_NO_PLAYERS
              value: "true"
            - name: PLAYERS_ONLINE_CHECK_INTERVAL
              value: 5m
            # restic dedup is what makes this retention fit in 80Gi.
            # PRUNE_BACKUPS_DAYS must stay at its nonzero default or restic
            # pruning silently disables (itzg/docker-mc-backup quirk).
            - name: PRUNE_RESTIC_RETENTION
              value: "--keep-hourly 24 --keep-daily 14 --keep-weekly 8"
            # Image defaults plus packs/ (the staged server pack zips are
            # re-fetchable from R2; no reason to snapshot 1.1GB hourly).
            - name: EXCLUDES
              value: "*.jar,cache,logs,*.tmp,packs"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              # restic prune holds the repo index in memory. An OOM kill mid
              # prune is safe (restic is transactional) and the stale lock is
              # cleared automatically on container restart.
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /data
              readOnly: true
            - name: backups
              mountPath: /backups
            - name: secrets
              mountPath: /secrets
              readOnly: true
      volumes:
        - name: secrets
          secret:
            secretName: mc-secrets
  volumeClaimTemplates:
    # World and pack on jade's NVMe. Never Longhorn for live world data;
    # replicated sync writes hurt the tick loop. The nodeSelector pin
    # to jade lives in the homelab overlay, next to the cluster that owns it.
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: local-path
        resources:
          requests:
            storage: 150Gi
    # restic repository, replicated across all three nodes by Longhorn, so
    # backups survive losing jade entirely.
    - metadata:
        name: backups
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: longhorn
        resources:
          requests:
            storage: 80Gi
